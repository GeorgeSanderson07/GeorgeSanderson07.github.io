<script>

//Function to make topnav responsive on smaller screens
function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "topnav") {
    x.className += " responsive";
  } else {
    x.className = "topnav";
  }
}


let blurContainer = document.getElementById("blurContainer");
let header = document.getElementById("myTopnav");
let banner = document.getElementByID("hero-image");
let footer = document.getElementByID("footer");

function openPopup(popupID){
  let idStr = String(popupID);
  let targetPopup = "popup"+idStr;
  let popup = document.getElementById(targetPopup);
  popup.classList.add("open-popup");
  blurContainer.classList.add("blurred");
  header.classList.add("blurred");
  footer.classList.add("blurred");
}
function closePopup(popupID){
  let idStr = String(popupID);
  let targetPopup = "popup"+idStr;
  let popup = document.getElementById(targetPopup);
  popup.classList.remove("open-popup");
  blurContainer.classList.remove("blurred");
  header.classList.remove("blurred");
}


//Functions for media controls
var myVid = document.getElementById("video1");

//Play and pause video when the button is clicked
function playPause() {
  if(myVid.paused)
    myVid.play();
  else
    myVid.pause();
}

//Toggle the icon of the play/pause button when clicked
document.getElementById("vidNav").addEventListener("click", function (picChange) {
    var target = picChange.target;
    target.classList.toggle("fa-pause");
}, false);
</script>
